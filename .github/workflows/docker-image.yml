name: Build & Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug secrets
        run: echo "USER=${{ secrets.DOCKER_USERNAME }}"

      - name: Login to Docker
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
      - name: Build Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/admin:latest .

      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/admin:latest
